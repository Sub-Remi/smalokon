<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Berita - SMA Lokon Tomohon</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: "#001f3f",
              gold: "#f1c40f",
            },
          },
        },
      };
    </script>
    <!-- Font Awesome 6 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .sidebar-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .sidebar-scroll::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      .sidebar-scroll::-webkit-scrollbar-thumb {
        background: #001f3f;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="font-[Poppins] bg-gray-100">
    <div class="flex h-screen overflow-hidden">
      <!-- Sidebar (sama dengan dashboard) -->
      <aside class="w-64 bg-navy text-white flex flex-col">
        <div class="p-5 border-b border-white/10">
          <div class="flex items-center gap-3">
            <img src="logo/smalokon.png" alt="SMA Lokon" class="h-10 w-auto" />
            <h2 class="text-xl font-bold">Admin Panel</h2>
          </div>
        </div>
        <nav class="flex-1 overflow-y-auto py-4 sidebar-scroll">
          <ul class="space-y-1 px-3">
            <li>
              <a
                href="admin-dashboard.html"
                class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition"
                ><i class="fas fa-tachometer-alt w-5"></i
                ><span>Dashboard</span></a
              >
            </li>
            <li>
              <a
                href="admin-berita.html"
                class="flex items-center gap-3 px-4 py-3 rounded-lg bg-gold/10 text-gold font-medium"
                ><i class="fas fa-newspaper w-5"></i><span>Berita</span></a
              >
            </li>
            <li>
              <a
                href="admin-fasilitas.html"
                class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition"
                ><i class="fas fa-building w-5"></i><span>Fasilitas</span></a
              >
            </li>
            <li>
              <a
                href="admin-galeri.html"
                class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition"
                ><i class="fas fa-images w-5"></i><span>Galeri</span></a
              >
            </li>
            <li>
              <a
                href="admin-admission.html"
                class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition"
                ><i class="fas fa-graduation-cap w-5"></i
                ><span>Penerimaan</span></a
              >
            </li>
            <li>
              <a
                href="admin-tentang.html"
                class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition"
                ><i class="fas fa-info-circle w-5"></i><span>Tentang</span></a
              >
            </li>
            <li>
              <a
                href="admin-kontak.html"
                class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition"
                ><i class="fas fa-envelope w-5"></i><span>Kontak</span></a
              >
            </li>
            <li class="pt-4 mt-4 border-t border-white/10">
              <a
                href="#"
                id="logoutBtn"
                class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-red-500/20 text-red-300"
                ><i class="fas fa-sign-out-alt w-5"></i><span>Logout</span></a
              >
            </li>
          </ul>
        </nav>
        <div class="p-4 text-xs text-white/60 border-t border-white/10">
          &copy; 2026 SMA Lokon
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 overflow-y-auto p-6">
        <div class="flex justify-between items-center mb-6">
          <h1 class="text-3xl font-bold text-navy">Kelola Berita</h1>
          <a
            href="admin-berita-tambah.html"
            class="bg-navy text-white px-4 py-2 rounded-lg hover:bg-gold hover:text-navy transition flex items-center gap-2"
            ><i class="fas fa-plus"></i> Tambah Berita</a
          >
        </div>

        <!-- Filter / Search -->
        <div
          class="bg-white rounded-xl shadow-md p-4 mb-6 flex flex-wrap gap-4 items-center justify-between"
        >
          <div class="flex gap-2 flex-wrap">
            <select
              id="filterKategori"
              class="border rounded-lg px-3 py-2 text-sm"
            >
              <option value="">Semua Kategori</option>
              <option value="Prestasi">Prestasi</option>
              <option value="Kegiatan">Kegiatan</option>
              <option value="Sosial">Sosial</option>
              <option value="Pengumuman">Pengumuman</option>
            </select>
            <input
              type="text"
              id="searchInput"
              placeholder="Cari judul..."
              class="border rounded-lg px-4 py-2 text-sm w-64"
            />
          </div>
          <button
            id="searchBtn"
            class="bg-gray-200 px-4 py-2 rounded-lg text-sm hover:bg-gray-300 transition"
          >
            Cari
          </button>
        </div>

        <!-- Tabel Berita -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
          <table class="w-full text-sm">
            <thead class="bg-navy text-white">
              <tr>
                <th class="px-6 py-3 text-left">Judul</th>
                <th class="px-6 py-3 text-left">Kategori</th>
                <th class="px-6 py-3 text-left">Tanggal</th>
                <th class="px-6 py-3 text-left">Status</th>
                <th class="px-6 py-3 text-left">Aksi</th>
              </tr>
            </thead>
            <tbody id="beritaTableBody" class="divide-y">
              <!-- Akan diisi JavaScript -->
            </tbody>
          </table>
          <!-- Pagination -->
          <div
            class="px-6 py-4 border-t flex flex-wrap justify-between items-center gap-4"
          >
            <span id="paginationInfo" class="text-sm text-gray-600"
              >Menampilkan 0-0 dari 0 berita</span
            >
            <div id="paginationButtons" class="flex gap-2">
              <!-- Tombol pagination akan diisi JavaScript -->
            </div>
          </div>
        </div>
      </main>
    </div>

    <script>
      // Cek token
      const token = localStorage.getItem("token");
      if (!token) {
        window.location.href = "admin-login.html";
      }

      // Ambil data user (opsional)
      const user = JSON.parse(localStorage.getItem("user") || "{}");

      // Fungsi fetch dengan token
      async function fetchWithAuth(url, options = {}) {
        const headers = {
          Authorization: `Bearer ${token}`,
          ...options.headers,
        };
        const response = await fetch(url, { ...options, headers });
        if (response.status === 401) {
          localStorage.removeItem("token");
          localStorage.removeItem("user");
          window.location.href = "admin-login.html";
          return null;
        }
        return response;
      }

      // State pagination
      let currentPage = 1;
      const limit = 5; // jumlah per halaman
      let totalData = 0;
      let totalPages = 1;
      let currentFilter = "";
      let currentSearch = "";

      // Elemen DOM
      const tbody = document.getElementById("beritaTableBody");
      const paginationInfo = document.getElementById("paginationInfo");
      const paginationButtons = document.getElementById("paginationButtons");
      const filterKategori = document.getElementById("filterKategori");
      const searchInput = document.getElementById("searchInput");
      const searchBtn = document.getElementById("searchBtn");

      // Fungsi memuat data
      async function loadBerita() {
        try {
          // Bangun query string
          let query = `?page=${currentPage}&limit=${limit}`;
          if (currentFilter) {
            query += `&kategori=${encodeURIComponent(currentFilter)}`;
          }
          if (currentSearch) {
            query += `&search=${encodeURIComponent(currentSearch)}`;
          }

          // Ambil data berita
          const res = await fetchWithAuth(`/api/berita${query}`);
          if (!res) return;
          const berita = await res.json();

          // Ambil total count (dengan filter yang sama)
          let countUrl = "/api/berita/count";
          const countParams = new URLSearchParams();
          if (currentFilter) countParams.append("kategori", currentFilter);
          if (currentSearch) countParams.append("search", currentSearch);
          if (countParams.toString()) countUrl += "?" + countParams.toString();

          const countRes = await fetchWithAuth(countUrl);
          if (!countRes) return;
          const countData = await countRes.json();
          totalData = countData.count;
          totalPages = Math.ceil(totalData / limit);

          // Render tabel
          renderTabel(berita);
          renderPagination();
        } catch (err) {
          console.error("Gagal memuat berita:", err);
        }
      }

      // Render tabel
      function renderTabel(berita) {
        if (berita.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">Tidak ada berita</td></tr>`;
          return;
        }

        tbody.innerHTML = berita
          .map((item) => {
            const statusClass =
              item.status === "Published"
                ? "bg-green-100 text-green-700"
                : "bg-yellow-100 text-yellow-700";
            return `
                    <tr>
                        <td class="px-6 py-4">${item.judul}</td>
                        <td class="px-6 py-4">${item.kategori}</td>
                        <td class="px-6 py-4">${new Date(item.tanggal).toLocaleDateString("id-ID")}</td>
                        <td class="px-6 py-4"><span class="${statusClass} px-2 py-1 rounded-full text-xs">${item.status}</span></td>
                        <td class="px-6 py-4 space-x-3">
                            <a href="admin-berita-edit.html?id=${item.id}" class="text-blue-600 hover:text-blue-800"><i class="fas fa-edit"></i></a>
                            <button class="text-red-600 hover:text-red-800" onclick="hapusBerita(${item.id})"><i class="fas fa-trash"></i></button>
                            <a href="admin-berita-view.html?id=${item.id}" class="text-gray-600 hover:text-gray-800"><i class="fas fa-eye"></i></a>
                        </td>
                    </tr>
                `;
          })
          .join("");
      }

      // Render tombol pagination
      function renderPagination() {
        const start = (currentPage - 1) * limit + 1;
        const end = Math.min(currentPage * limit, totalData);
        paginationInfo.textContent = `Menampilkan ${start}-${end} dari ${totalData} berita`;

        let buttonsHtml = "";

        // Tombol Previous
        buttonsHtml += `<button class="px-3 py-1 border rounded ${currentPage === 1 ? "bg-gray-100 text-gray-400 cursor-not-allowed" : "hover:bg-gray-100"}" 
                ${currentPage === 1 ? "disabled" : ""} onclick="changePage(${currentPage - 1})">Prev</button>`;

        // Nomor halaman (maksimal 5)
        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, currentPage + 2);
        for (let i = startPage; i <= endPage; i++) {
          buttonsHtml += `<button class="px-3 py-1 border rounded ${i === currentPage ? "bg-navy text-white" : "hover:bg-gray-100"}" onclick="changePage(${i})">${i}</button>`;
        }

        // Tombol Next
        buttonsHtml += `<button class="px-3 py-1 border rounded ${currentPage === totalPages ? "bg-gray-100 text-gray-400 cursor-not-allowed" : "hover:bg-gray-100"}" 
                ${currentPage === totalPages ? "disabled" : ""} onclick="changePage(${currentPage + 1})">Next</button>`;

        paginationButtons.innerHTML = buttonsHtml;
      }

      // Fungsi ganti halaman
      window.changePage = (page) => {
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        loadBerita();
      };

      // Fungsi hapus berita
      window.hapusBerita = async (id) => {
        if (!confirm("Yakin ingin menghapus berita ini?")) return;
        try {
          const res = await fetchWithAuth(`/api/berita/${id}`, {
            method: "DELETE",
          });
          if (res && res.ok) {
            // Refresh data
            loadBerita();
          } else {
            alert("Gagal menghapus berita");
          }
        } catch (err) {
          alert("Terjadi kesalahan");
        }
      };

      // Event listener untuk filter dan pencarian
      function applyFilter() {
        currentFilter = filterKategori.value;
        currentSearch = searchInput.value.trim();
        currentPage = 1; // reset ke halaman pertama
        loadBerita();
      }

      searchBtn.addEventListener("click", applyFilter);
      filterKategori.addEventListener("change", applyFilter);
      searchInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") applyFilter();
      });

      // Logout
      document.getElementById("logoutBtn").addEventListener("click", (e) => {
        e.preventDefault();
        localStorage.removeItem("token");
        localStorage.removeItem("user");
        window.location.href = "admin-login.html";
      });

      // Inisialisasi
      loadBerita();
    </script>
  </body>
</html>
