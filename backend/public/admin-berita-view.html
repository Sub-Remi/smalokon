<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Berita - Admin SMA Lokon</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#001f3f',
                        gold: '#f1c40f',
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .sidebar-scroll::-webkit-scrollbar { width:6px; } 
        .sidebar-scroll::-webkit-scrollbar-track { background:#f1f1f1; } 
        .sidebar-scroll::-webkit-scrollbar-thumb { background:#001f3f; border-radius:10px; }
    </style>
</head>
<body class="font-[Poppins] bg-gray-100">

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-navy text-white flex flex-col">
            <div class="p-5 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <img src="logo/smalokon.png" alt="SMA Lokon" class="h-10 w-auto ">
                    <h2 class="text-xl font-bold">Admin Panel</h2>
                </div>
            </div>
            <nav class="flex-1 overflow-y-auto py-4 sidebar-scroll">
                <ul class="space-y-1 px-3">
                    <li><a href="admin-dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition"><i class="fas fa-tachometer-alt w-5"></i><span>Dashboard</span></a></li>
                    <li><a href="admin-berita.html" class="flex items-center gap-3 px-4 py-3 rounded-lg bg-gold/10 text-gold font-medium"><i class="fas fa-newspaper w-5"></i><span>Berita</span></a></li>
                    <li><a href="admin-fasilitas.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition"><i class="fas fa-building w-5"></i><span>Fasilitas</span></a></li>
                    <li><a href="admin-galeri.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition"><i class="fas fa-images w-5"></i><span>Galeri</span></a></li>
                    <li><a href="admin-admission.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition"><i class="fas fa-graduation-cap w-5"></i><span>Penerimaan</span></a></li>
                    <li><a href="admin-tentang.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition"><i class="fas fa-info-circle w-5"></i><span>Tentang</span></a></li>
                    <li><a href="admin-kontak.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition"><i class="fas fa-envelope w-5"></i><span>Kontak</span></a></li>
                    <li class="pt-4 mt-4 border-t border-white/10"><a href="admin-login.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-red-500/20 text-red-300"><i class="fas fa-sign-out-alt w-5"></i><span>Logout</span></a></li>
                </ul>
            </nav>
            <div class="p-4 text-xs text-white/60 border-t border-white/10">&copy; 2026 SMA Lokon</div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-6">
        <div class="mb-4">
            <a href="admin-berita.html" class="text-navy hover:text-gold transition flex items-center gap-2"><i class="fas fa-arrow-left"></i> Kembali ke Daftar Berita</a>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6 md:p-8" id="detailContainer">
            <!-- Akan diisi JS -->
            <div class="text-center py-8">Memuat...</div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'admin-login.html';
        }

        const urlParams = new URLSearchParams(window.location.search);
        const beritaId = urlParams.get('id');
        if (!beritaId) {
            alert('ID berita tidak ditemukan');
            window.location.href = 'admin-berita.html';
        }

        async function loadDetail() {
            try {
                const response = await fetch(`/api/berita/${beritaId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error('Gagal mengambil data');
                const data = await response.json();

                const statusClass = data.status === 'Published' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700';
                const html = `
                    <div class="flex flex-wrap gap-4 text-gray-500 mb-4">
                        <span><i class="fas fa-calendar-alt text-gold mr-2"></i> ${new Date(data.tanggal).toLocaleDateString('id-ID')}</span>
                        <span><i class="fas fa-user text-gold mr-2"></i> ${data.penulis}</span>
                        <span><i class="fas fa-folder text-gold mr-2"></i> ${data.kategori}</span>
                        <span class="${statusClass} px-3 py-1 rounded-full text-xs">${data.status}</span>
                    </div>
                    <h1 class="text-3xl md:text-4xl font-bold text-navy mb-4">${data.judul}</h1>
                    ${data.gambar ? `<img src="/uploads/${data.gambar}" alt="Gambar" class="w-full rounded-xl mb-6 shadow-md">` : ''}
                    <div class="prose max-w-none text-gray-700">
                        ${data.konten.replace(/\n/g, '<br>')}
                    </div>
                    <div class="flex gap-3 mt-6 pt-4 border-t">
                        <a href="admin-berita-edit.html?id=${data.id}" class="bg-navy text-white px-5 py-2 rounded-lg hover:bg-gold hover:text-navy transition flex items-center gap-2"><i class="fas fa-edit"></i> Edit</a>
                        <button class="border border-red-500 text-red-500 px-5 py-2 rounded-lg hover:bg-red-500 hover:text-white transition flex items-center gap-2" onclick="hapusBerita(${data.id})"><i class="fas fa-trash"></i> Hapus</button>
                    </div>
                `;
                document.getElementById('detailContainer').innerHTML = html;
            } catch (err) {
                document.getElementById('detailContainer').innerHTML = `<div class="text-red-500 text-center py-8">${err.message}</div>`;
            }
        }

        window.hapusBerita = async (id) => {
            if (confirm('Yakin ingin menghapus berita ini?')) {
                try {
                    const response = await fetch(`/api/berita/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (response.ok) {
                        window.location.href = 'admin-berita.html';
                    } else {
                        alert('Gagal menghapus');
                    }
                } catch (err) {
                    alert('Terjadi kesalahan');
                }
            }
        };

        loadDetail();

        // Logout
        document.querySelector('a[href="admin-login.html"]').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'admin-login.html';
        });
    </script>
</body>
</html>
