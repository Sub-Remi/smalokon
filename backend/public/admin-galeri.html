<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Galeri - SMA Lokon Tomohon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{navy:'#001f3f',gold:'#f1c40f',}}}}</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>.sidebar-scroll::-webkit-scrollbar { width:6px; } .sidebar-scroll::-webkit-scrollbar-track { background:#f1f1f1; } .sidebar-scroll::-webkit-scrollbar-thumb { background:#001f3f; border-radius:10px; }</style>
</head>
<body class="font-[Poppins] bg-gray-100">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-navy text-white flex flex-col">
            <div class="p-5 border-b border-white/10">
                <div class="flex items-center gap-3"><img src="logo/smalokon.png" alt="SMA Lokon" class="h-10 w-auto"><h2 class="text-xl font-bold">Admin Panel</h2></div>
            </div>
            <nav class="flex-1 overflow-y-auto py-4 sidebar-scroll">
                <ul class="space-y-1 px-3">
                    <li><a href="admin-dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10"><i class="fas fa-tachometer-alt w-5"></i><span>Dashboard</span></a></li>
                    <li><a href="admin-berita.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10"><i class="fas fa-newspaper w-5"></i><span>Berita</span></a></li>
                    <li><a href="admin-fasilitas.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10"><i class="fas fa-building w-5"></i><span>Fasilitas</span></a></li>
                    <li><a href="admin-galeri.html" class="flex items-center gap-3 px-4 py-3 rounded-lg bg-gold/10 text-gold font-medium"><i class="fas fa-images w-5"></i><span>Galeri</span></a></li>
                    <li><a href="admin-admission.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10"><i class="fas fa-graduation-cap w-5"></i><span>Penerimaan</span></a></li>
                    <li><a href="admin-tentang.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10"><i class="fas fa-info-circle w-5"></i><span>Tentang</span></a></li>
                    <li><a href="admin-kontak.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10"><i class="fas fa-envelope w-5"></i><span>Kontak</span></a></li>
                    <li class="pt-4 mt-4 border-t border-white/10"><a href="admin-login.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-red-500/20 text-red-300"><i class="fas fa-sign-out-alt w-5"></i><span>Logout</span></a></li>
                </ul>
            </nav>
            <div class="p-4 text-xs text-white/60 border-t border-white/10">&copy; 2026 SMA Lokon</div>
        </aside>

        <main class="flex-1 overflow-y-auto p-6">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-bold text-navy">Kelola Galeri</h1>
                <a href="admin-galeri-tambah.html" class="bg-navy text-white px-4 py-2 rounded-lg hover:bg-gold hover:text-navy transition flex items-center gap-2"><i class="fas fa-upload"></i> Unggah Foto</a>
            </div>

            <!-- Upload area (bisa dihapus atau dipertahankan sebagai alternatif) -->
            <div class="bg-white rounded-xl shadow-md p-6 mb-6 border-2 border-dashed border-gray-300 text-center">
                <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-2"></i>
                <p class="text-gray-600">Drag & drop foto di sini atau klik untuk memilih</p>
                <input type="file" multiple class="hidden" id="fileInput">
                <button onclick="document.getElementById('fileInput').click()" class="mt-3 bg-gray-200 px-4 py-2 rounded-lg hover:bg-gray-300 transition">Pilih File</button>
            </div>

            <!-- Grid Galeri -->
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
                <!-- Item 1 -->
                <div class="relative group">
                    <img src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=200&h=200&fit=crop" class="w-full h-32 object-cover rounded-lg">
                    <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition flex items-center justify-center gap-2 rounded-lg">
                        <a href="admin-galeri-edit.html" class="text-white hover:text-gold"><i class="fas fa-edit"></i></a>
                        <button class="text-white hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                    <span class="absolute top-1 right-1 bg-navy text-white text-xs px-2 py-1 rounded">Kegiatan</span>
                </div>
                <!-- Item 2 -->
                <div class="relative group">
                    <img src="https://images.unsplash.com/photo-1541339907198-e08756dedf3f?w=200&h=200&fit=crop" class="w-full h-32 object-cover rounded-lg">
                    <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition flex items-center justify-center gap-2 rounded-lg">
                        <a href="admin-galeri-edit.html" class="text-white hover:text-gold"><i class="fas fa-edit"></i></a>
                        <button class="text-white hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                    <span class="absolute top-1 right-1 bg-navy text-white text-xs px-2 py-1 rounded">Upacara</span>
                </div>
                <!-- Item 3 -->
                <div class="relative group">
                    <img src="https://images.unsplash.com/photo-1524178232363-1fb2b075b655?w=200&h=200&fit=crop" class="w-full h-32 object-cover rounded-lg">
                    <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition flex items-center justify-center gap-2 rounded-lg">
                        <a href="admin-galeri-edit.html" class="text-white hover:text-gold"><i class="fas fa-edit"></i></a>
                        <button class="text-white hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                    <span class="absolute top-1 right-1 bg-navy text-white text-xs px-2 py-1 rounded">Olahraga</span>
                </div>
                <!-- Item 4 -->
                <div class="relative group">
                    <img src="https://images.unsplash.com/photo-1577896851231-70ef18881754?w=200&h=200&fit=crop" class="w-full h-32 object-cover rounded-lg">
                    <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition flex items-center justify-center gap-2 rounded-lg">
                        <a href="admin-galeri-edit.html" class="text-white hover:text-gold"><i class="fas fa-edit"></i></a>
                        <button class="text-white hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                    <span class="absolute top-1 right-1 bg-navy text-white text-xs px-2 py-1 rounded">Perpustakaan</span>
                </div>
                <!-- Item 5 -->
                <div class="relative group">
                    <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?w=200&h=200&fit=crop" class="w-full h-32 object-cover rounded-lg">
                    <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition flex items-center justify-center gap-2 rounded-lg">
                        <a href="admin-galeri-edit.html" class="text-white hover:text-gold"><i class="fas fa-edit"></i></a>
                        <button class="text-white hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                    <span class="absolute top-1 right-1 bg-navy text-white text-xs px-2 py-1 rounded">Sekolah</span>
                </div>
                <!-- Item 6 -->
                <div class="relative group">
                    <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=200&h=200&fit=crop" class="w-full h-32 object-cover rounded-lg">
                    <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition flex items-center justify-center gap-2 rounded-lg">
                        <a href="admin-galeri-edit.html" class="text-white hover:text-gold"><i class="fas fa-edit"></i></a>
                        <button class="text-white hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                    <span class="absolute top-1 right-1 bg-navy text-white text-xs px-2 py-1 rounded">Praktikum</span>
                </div>
                <!-- Tambah item placeholder -->
                <a href="admin-galeri-tambah.html" class="border-2 border-dashed border-gray-300 rounded-lg h-32 flex items-center justify-center text-gray-400 hover:border-gold hover:text-gold transition cursor-pointer">
                    <i class="fas fa-plus text-3xl"></i>
                </a>
            </div>

            <!-- Pagination -->
            <div class="flex justify-between items-center mt-6">
                <span class="text-sm text-gray-600">Menampilkan 1-6 dari 24 foto</span>
                <div class="flex gap-2">
                    <button class="px-3 py-1 border rounded hover:bg-gray-100">Prev</button>
                    <button class="px-3 py-1 bg-navy text-white rounded">1</button>
                    <button class="px-3 py-1 border rounded hover:bg-gray-100">2</button>
                    <button class="px-3 py-1 border rounded hover:bg-gray-100">3</button>
                    <button class="px-3 py-1 border rounded hover:bg-gray-100">4</button>
                    <button class="px-3 py-1 border rounded hover:bg-gray-100">Next</button>
                </div>
            </div>
        </main>
    </div>
    <script>
        // Placeholder untuk upload
        document.getElementById('fileInput')?.addEventListener('change', function(e) {
            alert('Fungsi upload belum diimplementasikan (demo)');
        });
    </script>
</body>
</html>
