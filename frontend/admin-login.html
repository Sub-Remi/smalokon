<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SMA Lokon Tomohon</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#001f3f',
                        gold: '#f1c40f',
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-[Poppins] bg-gray-100">

    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
            <!-- Logo -->
            <div class="text-center mb-8">
                <img src="logo/smalokon.png" alt="SMA Lokon" class="h-20 mx-auto mb-4">
                <h2 class="text-2xl font-bold text-navy">Admin Panel</h2>
                <p class="text-gray-600">Masuk ke dashboard admin</p>
            </div>

            <!-- Login Form -->
            <form action="admin-dashboard.html" method="get" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                    <input type="text" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-gold focus:ring-2 focus:ring-gold/20">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-gold focus:ring-2 focus:ring-gold/20">
                </div>
                <button type="submit" class="w-full bg-navy text-white py-3 rounded-xl font-semibold hover:bg-gold hover:text-navy transition shadow-md">Login</button>
            </form>

            <!-- Demo credentials -->
            <p class="text-center text-sm text-gray-500 mt-6">Demo: admin / admin123</p>
        </div>
    </div>

</body>
</html>
